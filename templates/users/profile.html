{% extends 'base/base.html' %}

{% block title %} Profile - LMS Platform{% endblock %}

{% block content %}

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body text-center">
                    <i class="fas fa-user-circle fa-5x mb-3 text-primary"></i>
                    <h4>{{ user.username }}</h4>
                    <p class="text-muted">{{ user.email }}</p>
                    <span class="badge bg-primary">{{ user.get_role_display }}</span>
                    {% if user.bio %}
                    <p class="mt-3">{{ user.bio }}</p>
                    {{ endif }}
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <h4>Profile Settings</h4>
                    <p class="text-muted">Profile  management coming soon...</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
