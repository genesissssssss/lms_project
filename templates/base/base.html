<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} LMS PLATFORM {% endblock %}</title>
    <!-- bootstrap 5-->
     <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
    </head>
     
<body>
    <!--navigation-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="fas fa-graduation-cap me-2"></i>LMS Platform
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'course_list' %}">
                        <i class="fas fa-book"></i> Courses
                        </a>
                    </li>
                     {% if user.is_authenticated %}
                     <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard' %}">
                            <i class="fas fa-chart-line"></i> Dashboard
                        </a>
                     </li>
                     <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-target="dropdown">
                            <i class="fas fa-user"></i> {{ user.username }}
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" >
                            <li><a class="dropdown-item" href="{% url 'profile' %}">
                                <i class="fas fa-user-cog"></i> Profile
                            </a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="{% url 'logout' %}">
                                <i class="fas fa-sign-out-alt"></i>Logout
                            </a></li>
                        </ul>
                     </li>
                     {% else %}
                     <li class="nav-item">
                        <a class="nav-link" href="{% url 'login'% }">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </a>
                     </li>
                     <li class="nav-item">
                        <a class="nav-link btn btn-light text-primary px-3" href="{% url 'register' %}"> Sign Up</a>
                     </li>
                     {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    
</body>
</html>
